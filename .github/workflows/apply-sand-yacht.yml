name: Apply Sand yacht update

on:
  push:
    paths:
      - .github/workflows/apply-sand-yacht.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update calculator files
        run: |
          python <<'PY'
          from pathlib import Path

          calculator = Path("yacht-calculator_vS250601.html")
          html = calculator.read_text(encoding="utf-8")

          sand_block = r'''      {
        "id": "yacht_sand",
        "name": "Sand",
        "basePax": 0,
        "maxCapacity": 40,
        "priceTiers": {
          "weekday": [
            { "upToPax": 15, "base4h": 3500 },
            { "upToPax": 20, "base4h": 4000 },
            { "upToPax": 25, "base4h": 4500 },
            { "upToPax": 30, "base4h": 5000 },
            { "upToPax": 35, "base4h": 5500 },
            { "upToPax": 40, "base4h": 6000 }
          ],
          "weekend": [
            { "upToPax": 15, "base4h": 4000 },
            { "upToPax": 20, "base4h": 4500 },
            { "upToPax": 25, "base4h": 5000 },
            { "upToPax": 30, "base4h": 5500 },
            { "upToPax": 35, "base4h": 6000 },
            { "upToPax": 40, "base4h": 6500 }
          ],
          "ph": [
            { "upToPax": 15, "base4h": 4800 },
            { "upToPax": 20, "base4h": 5400 },
            { "upToPax": 25, "base4h": 6000 },
            { "upToPax": 30, "base4h": 6600 },
            { "upToPax": 35, "base4h": 7200 },
            { "upToPax": 40, "base4h": 7800 }
          ]
        },
        "subsequentHourRateForAllTiers": {
          "weekday": 1000,
          "weekend": 1300,
          "ph": 1560
        },
        "extraPaxCost": 0,
        "variableExtraPax": false,
        "gstApplicable": true,
        "hasTieredPaxPricing": true,
        "includedServices": "Karaoke\\nMicrowave/Oven\\nBluetooth-compatible Stereo System\\nFully Air-Conditioned saloon\\nOne 15 Marina",
        "addons": [
          { "name": "BBQ service", "price": 300, "selected": false, "id": "sand_addon_bbq_service" },
          { "name": "Jetski (1hr, pillion only)", "price": 400, "selected": false, "id": "sand_addon_jetski_1hr_pillion" }
        ]
      },'''

          if '"id": "yacht_sand"' not in html:
              marker = "\n];\n\n    // Populate PH tiers"
              if marker not in html:
                  raise SystemExit("Could not find yachtData insertion marker")
              html = html.replace(marker, "\n" + sand_block + "\n];\n\n    // Populate PH tiers", 1)

          old_rate_line = "let currentSubsequentHourRate = currentSelectedYacht.hasTieredPaxPricing ? currentSelectedYacht.subsequentHourRateForAllTiers : subsequentHourRate;"
          new_rate_line = """let currentSubsequentHourRate = currentSelectedYacht.hasTieredPaxPricing ? currentSelectedYacht.subsequentHourRateForAllTiers : subsequentHourRate;
      if (currentSelectedYacht.hasTieredPaxPricing && typeof currentSelectedYacht.subsequentHourRateForAllTiers === 'object') {
        currentSubsequentHourRate = currentSelectedYacht.subsequentHourRateForAllTiers[selectedTimeSlotValue] ?? 0;
      }"""
          if "typeof currentSelectedYacht.subsequentHourRateForAllTiers === 'object'" not in html:
              if old_rate_line not in html:
                  raise SystemExit("Could not find tiered hourly-rate calculation line")
              html = html.replace(old_rate_line, new_rate_line, 1)

          calculator.write_text(html, encoding="utf-8")

          Path("index.html").write_text('''<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0;url=./yacht-calculator_vS250601.html" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 2rem; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <h1>Redirecting...</h1>
  <p>If you are not redirected automatically, <a href="yacht-calculator_vS250601.html">click here to open the Yacht Calculator</a>.</p>
</body>
</html>
''', encoding="utf-8")

          Path("yacht-calculator_sand.html").unlink(missing_ok=True)
          Path(".github/workflows/apply-sand-yacht.yml").unlink(missing_ok=True)
          PY
      - name: Commit updated calculator
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Add Sand to main yacht calculator"
            git push
          else
            echo "No changes to commit"
          fi
