name: SGyacht Pricing Update

# Triggered once by Codex to update SGyacht pricing, then removed by the workflow.
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sgyacht-update.yml

permissions:
  contents: write

jobs:
  update-sgyacht:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch SGyacht pricing
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'yacht-calculator_vS250601.html';
          const text = fs.readFileSync(path, 'utf8');
          const marker = '"id": "yacht_sgyacht"';
          const markerIndex = text.indexOf(marker);
          if (markerIndex === -1) throw new Error('SGyacht block not found');
          const objectStart = text.lastIndexOf('      {', markerIndex);
          if (objectStart === -1) throw new Error('SGyacht object start not found');
          let i = objectStart;
          let depth = 0;
          let inString = false;
          let escaped = false;
          let objectEnd = -1;
          for (; i < text.length; i++) {
            const ch = text[i];
            if (inString) {
              if (escaped) escaped = false;
              else if (ch === '\\') escaped = true;
              else if (ch === '"') inString = false;
            } else {
              if (ch === '"') inString = true;
              else if (ch === '{') depth++;
              else if (ch === '}') {
                depth--;
                if (depth === 0) {
                  objectEnd = i + 1;
                  break;
                }
              }
            }
          }
          if (objectEnd === -1) throw new Error('SGyacht object end not found');
          const replacement = `      { 
        "id": "yacht_sgyacht",
        "name": "SGyacht",
        "basePax": 0,
        "maxCapacity": 28,
        "priceTiers": { 
          "weekday": [
            { "upToPax": 15, "base4h": 1150 },
            { "upToPax": 28, "base4h": 1500 }
          ], 
          "weekend": [
            { "upToPax": 15, "base4h": 1550 },
            { "upToPax": 28, "base4h": 1900 }
          ], 
          "ph": [
            { "upToPax": 15, "base4h": 1550 },
            { "upToPax": 28, "base4h": 1900 }
          ]
        },
        "subsequentHourRateForAllTiers": 300,
        "extraPaxCost": 0, 
        "variableExtraPax": false, 
        "gstApplicable": true, 
        "hasTieredPaxPricing": true, 
        "includedServices": "Karaoke\\nBar counter\\nMicrowave/Oven\\nBluetooth-compatible Stereo System\\nFully Air-Conditioned saloon\\n1x Double seater Kayak w 2 paddles (Damage/lost fee $150)\\n1x Stand up paddleboard w 1 paddle (Damage/lost fee $150)\\n1x Floating Mat (Damage fee $200)\\nMarina at Keppel Bay",
        "addons": [
          { "name": "BBQ pit rental + BBQ service", "price": 200, "selected": false, "id": "sgyacht_addon_bbq_pit_service" },
          { "name": "Disposable dining set", "price": 50, "selected": false, "id": "sgyacht_addon_disposable_dining" },
          { "name": "Ice 25kg", "price": 25, "selected": false, "id": "sgyacht_addon_ice_25kg" },
          { "name": "Pet Surcharge (per pet, not allowed in Saloon)", "price": 100, "selected": false, "id": "sgyacht_addon_pet_surcharge" }
        ]
      }`;
          const updated = text.slice(0, objectStart) + replacement + text.slice(objectEnd);
          fs.writeFileSync(path, updated);
          NODE
      - name: Commit SGyacht update and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/sgyacht-update.yml
          git add yacht-calculator_vS250601.html
          git commit -m "Update SGyacht pricing" || exit 0
          git push
