name: SGyacht Pricing Update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sgyacht-update.yml"

permissions:
  contents: write

jobs:
  update_sgyacht:
    runs-on: ubuntu-latest
    steps:
      - name: Patch SGyacht pricing through GitHub API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const https = require('https');
          const token = process.env.GH_TOKEN;
          const [owner, repo] = process.env.GH_REPOSITORY.split('/');
          const branch = 'main';
          const headers = {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'sgyacht-pricing-updater'
          };
          function request(method, path, body) {
            return new Promise((resolve, reject) => {
              const req = https.request({ hostname: 'api.github.com', method, path, headers }, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  const parsed = data ? JSON.parse(data) : null;
                  if (res.statusCode < 200 || res.statusCode >= 300) {
                    reject(new Error(`${method} ${path} failed ${res.statusCode}: ${data}`));
                  } else {
                    resolve(parsed);
                  }
                });
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }
          function replaceSgyacht(text) {
            const marker = '"id": "yacht_sgyacht"';
            const markerIndex = text.indexOf(marker);
            if (markerIndex === -1) throw new Error('SGyacht block not found');
            const objectStart = text.lastIndexOf('      {', markerIndex);
            if (objectStart === -1) throw new Error('SGyacht object start not found');
            let depth = 0, inString = false, escaped = false, objectEnd = -1;
            for (let i = objectStart; i < text.length; i++) {
              const ch = text[i];
              if (inString) {
                if (escaped) escaped = false;
                else if (ch === '\\') escaped = true;
                else if (ch === '"') inString = false;
              } else {
                if (ch === '"') inString = true;
                else if (ch === '{') depth++;
                else if (ch === '}') {
                  depth--;
                  if (depth === 0) { objectEnd = i + 1; break; }
                }
              }
            }
            if (objectEnd === -1) throw new Error('SGyacht object end not found');
            const replacement = [
              '      { ',
              '        "id": "yacht_sgyacht",',
              '        "name": "SGyacht",',
              '        "basePax": 0,',
              '        "maxCapacity": 28,',
              '        "priceTiers": { ',
              '          "weekday": [',
              '            { "upToPax": 15, "base4h": 1150 },',
              '            { "upToPax": 28, "base4h": 1500 }',
              '          ], ',
              '          "weekend": [',
              '            { "upToPax": 15, "base4h": 1550 },',
              '            { "upToPax": 28, "base4h": 1900 }',
              '          ], ',
              '          "ph": [',
              '            { "upToPax": 15, "base4h": 1550 },',
              '            { "upToPax": 28, "base4h": 1900 }',
              '          ]',
              '        },',
              '        "subsequentHourRateForAllTiers": 300,',
              '        "extraPaxCost": 0, ',
              '        "variableExtraPax": false, ',
              '        "gstApplicable": true, ',
              '        "hasTieredPaxPricing": true, ',
              '        "includedServices": "Karaoke\\\\nBar counter\\\\nMicrowave/Oven\\\\nBluetooth-compatible Stereo System\\\\nFully Air-Conditioned saloon\\\\n1x Double seater Kayak w 2 paddles (Damage/lost fee $150)\\\\n1x Stand up paddleboard w 1 paddle (Damage/lost fee $150)\\\\n1x Floating Mat (Damage fee $200)\\\\nMarina at Keppel Bay",',
              '        "addons": [',
              '          { "name": "BBQ pit rental + BBQ service", "price": 200, "selected": false, "id": "sgyacht_addon_bbq_pit_service" },',
              '          { "name": "Disposable dining set", "price": 50, "selected": false, "id": "sgyacht_addon_disposable_dining" },',
              '          { "name": "Ice 25kg", "price": 25, "selected": false, "id": "sgyacht_addon_ice_25kg" },',
              '          { "name": "Pet Surcharge (per pet, not allowed in Saloon)", "price": 100, "selected": false, "id": "sgyacht_addon_pet_surcharge" }',
              '        ]',
              '      }'
            ].join('\n');
            return text.slice(0, objectStart) + replacement + text.slice(objectEnd);
          }
          (async () => {
            const filePath = 'yacht-calculator_vS250601.html';
            const file = await request('GET', `/repos/${owner}/${repo}/contents/${filePath}?ref=${branch}`);
            const current = Buffer.from(file.content.replace(/\n/g, ''), 'base64').toString('utf8');
            const updated = replaceSgyacht(current);
            await request('PUT', `/repos/${owner}/${repo}/contents/${filePath}`, {
              message: 'Update SGyacht pricing',
              content: Buffer.from(updated, 'utf8').toString('base64'),
              sha: file.sha,
              branch
            });
            const workflowPath = '.github/workflows/sgyacht-update.yml';
            const workflow = await request('GET', `/repos/${owner}/${repo}/contents/${workflowPath}?ref=${branch}`);
            await request('DELETE', `/repos/${owner}/${repo}/contents/${workflowPath}`, {
              message: 'Remove SGyacht update workflow',
              sha: workflow.sha,
              branch
            });
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE
