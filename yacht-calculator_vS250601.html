<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yacht Charter Price Calculator</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 2rem; }
  </style>
</head>
<body>
  <p>Loading...</p>
  <script>
    const baseCalculatorUrl = './yacht-calculator_base_vS250601.html';

    const sandYachtBlock = `
      {
        "id": "yacht_sand",
        "name": "Sand",
        "basePax": 0,
        "maxCapacity": 40,
        "priceTiers": {
          "weekday": [
            { "upToPax": 15, "base4h": 3500 },
            { "upToPax": 20, "base4h": 4000 },
            { "upToPax": 25, "base4h": 4500 },
            { "upToPax": 30, "base4h": 5000 },
            { "upToPax": 35, "base4h": 5500 },
            { "upToPax": 40, "base4h": 6000 }
          ],
          "weekend": [
            { "upToPax": 15, "base4h": 4000 },
            { "upToPax": 20, "base4h": 4500 },
            { "upToPax": 25, "base4h": 5000 },
            { "upToPax": 30, "base4h": 5500 },
            { "upToPax": 35, "base4h": 6000 },
            { "upToPax": 40, "base4h": 6500 }
          ],
          "ph": [
            { "upToPax": 15, "base4h": 4800 },
            { "upToPax": 20, "base4h": 5400 },
            { "upToPax": 25, "base4h": 6000 },
            { "upToPax": 30, "base4h": 6600 },
            { "upToPax": 35, "base4h": 7200 },
            { "upToPax": 40, "base4h": 7800 }
          ]
        },
        "subsequentHourRateForAllTiers": {
          "weekday": 1000,
          "weekend": 1300,
          "ph": 1560
        },
        "extraPaxCost": 0,
        "variableExtraPax": false,
        "gstApplicable": true,
        "hasTieredPaxPricing": true,
        "includedServices": "Karaoke\\nMicrowave/Oven\\nBluetooth-compatible Stereo System\\nFully Air-Conditioned saloon\\nOne 15 Marina",
        "addons": [
          { "name": "BBQ service", "price": 300, "selected": false, "id": "sand_addon_bbq_service" },
          { "name": "Jetski (1hr, pillion only)", "price": 400, "selected": false, "id": "sand_addon_jetski_1hr_pillion" }
        ]
      },`;

    const arrayEndMarker = '\n];\n\n    // Populate PH tiers';
    const oldRateLine = 'let currentSubsequentHourRate = currentSelectedYacht.hasTieredPaxPricing ? currentSelectedYacht.subsequentHourRateForAllTiers : subsequentHourRate;';
    const patchedRateLine = `let currentSubsequentHourRate = currentSelectedYacht.hasTieredPaxPricing ? currentSelectedYacht.subsequentHourRateForAllTiers : subsequentHourRate;
      if (currentSelectedYacht.hasTieredPaxPricing && typeof currentSelectedYacht.subsequentHourRateForAllTiers === 'object') {
        currentSubsequentHourRate = currentSelectedYacht.subsequentHourRateForAllTiers[selectedTimeSlotValue] ?? 0;
      }`;

    function injectSandPricing(html) {
      let patched = html;

      if (!patched.includes('"id": "yacht_sand"') && patched.includes(arrayEndMarker)) {
        patched = patched.replace(arrayEndMarker, `\n${sandYachtBlock}\n];\n\n    // Populate PH tiers`);
      }

      if (
        patched.includes(oldRateLine) &&
        !patched.includes("typeof currentSelectedYacht.subsequentHourRateForAllTiers === 'object'")
      ) {
        patched = patched.replace(oldRateLine, patchedRateLine);
      }

      return patched;
    }

    fetch(baseCalculatorUrl, { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) throw new Error('Unable to load base calculator');
        return response.text();
      })
      .then((baseHtml) => {
        const finalHtml = injectSandPricing(baseHtml);
        document.open();
        document.write(finalHtml);
        document.close();
      })
      .catch((error) => {
        document.body.innerHTML = '<p>Unable to load calculator. Please refresh and try again.</p>';
        console.error(error);
      });
  </script>
</body>
</html>
